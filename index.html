<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TDJ Career Prospects - Mr. Smart</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --success: #10b981;
            --error: #ef4444;
            --border: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #020617;
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            touch-action: none; /* Prevents phone from scrolling while dragging */
        }

        header {
            padding: 15px 30px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.95);
        }

        .container { flex: 1; display: grid; padding: 20px; gap: 20px; overflow: hidden; }
        
        /* HUB PAGE */
        #hub-page { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); align-content: center; }
        .hub-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .hub-card:hover { border-color: var(--accent); transform: translateY(-5px); background: #243147; }
        .hub-card i { font-size: 3rem; color: var(--accent); margin-bottom: 15px; display: block; }

        /* CHALLENGE PAGE */
        #challenge-page { display: none; grid-template-columns: 300px 1fr; }
        
        .skills-sidebar {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            overflow-y: auto;
        }

        .skill-item {
            background: #0f172a;
            border: 1px solid var(--border);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: grab;
            font-size: 0.9rem;
            z-index: 100;
            touch-action: none;
        }

        .career-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            overflow-y: auto;
        }

        .career-card {
            background: var(--card-bg);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.2s;
        }

        .drop-hover { border-color: var(--accent); background: rgba(56, 189, 248, 0.05); }
        .correct { border-style: solid; border-color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .shake-error { animation: shake 0.4s ease-in-out; border-color: var(--error); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* MODAL */
        #modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 40px; border-radius: 20px; max-width: 500px; text-align: center;
            border: 1px solid var(--accent);
        }
        .btn {
            background: var(--accent); color: #000; border: none;
            padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        .matched-skill {
            margin-top: 10px;
            padding: 5px;
            background: var(--success);
            color: white;
            border-radius: 4px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <h1>TDJ Career Prospects</h1>
</header>

<div class="container" id="hub-page">
    <div class="hub-card" onclick="startChallenge()">
        <i>🛠️</i>
        <h2>The Integration Challenge</h2>
        <p>Match classroom skills to industrial career paths.</p>
    </div>
</div>

<div class="container" id="challenge-page">
    <div class="skills-sidebar">
        <h3>Classroom Skills</h3>
        <div class="skill-item" data-skill="arch">Building Codes & Zoning</div>
        <div class="skill-item" data-skill="mech">Tolerance & Fit (0.001")</div>
        <div class="skill-item" data-skill="robot">Logic Gates & PLC</div>
        <div class="skill-item" data-skill="arch">Topographic Surveying</div>
        <div class="skill-item" data-skill="mech">3D Assembly Stress Test</div>
    </div>

    <div class="career-grid">
        <div class="career-card" data-skill="arch" data-career="Architectural Technologist" data-skill-name="Surveying/Zoning" data-desc="Architectural Technologists turn designs into reality by applying building codes and creating detailed technical drawings.">
            <h3>Architectural Path</h3>
        </div>
        <div class="career-card" data-skill="mech" data-career="Mechanical Designer" data-skill-name="Tolerance/Stress" data-desc="Mechanical Designers focus on machines and tools, ensuring parts fit perfectly and can withstand real-world forces.">
            <h3>Mechanical Path</h3>
        </div>
        <div class="career-card" data-skill="robot" data-career="Robotics Technician" data-skill-name="PLC & Logic" data-desc="Robotics Techs maintain the automated systems used in manufacturing, working with electronics and code.">
            <h3>Automated Systems</h3>
        </div>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <h2 id="m-title"></h2>
        <p id="m-desc"></p>
        <button class="btn" onclick="closeModal()">Next Match</button>
    </div>
</div>

<script>
    function startChallenge() {
        document.getElementById('hub-page').style.display = 'none';
        document.getElementById('challenge-page').style.display = 'grid';
    }

    $(function() {
        // Init Draggable
        $('.skill-item').draggable({
            revert: "invalid",
            helper: "clone",
            cursor: "move",
            zIndex: 1000,
            appendTo: "body",
            start: function() { $(this).css('opacity', '0.3'); },
            stop: function() { $(this).css('opacity', '1'); }
        });

        // Init Droppable
        $('.career-card').droppable({
            accept: ".skill-item",
            hoverClass: "drop-hover",
            drop: function(event, ui) {
                const draggedSkill = ui.draggable.attr('data-skill');
                const targetSkill = $(this).attr('data-skill');

                if (draggedSkill === targetSkill) {
                    $(this).addClass('correct');
                    $(this).append(`<div class="matched-skill">✓ ${$(this).attr('data-skill-name')}</div>`);
                    ui.draggable.draggable('disable').css('opacity', '0');
                    
                    $('#m-title').text("Confirmed: " + $(this).attr('data-career'));
                    $('#m-desc').text($(this).attr('data-desc'));
                    $('#modal').css('display', 'flex');
                } else {
                    $(this).removeClass('shake-error').width();
                    $(this).addClass('shake-error');
                    setTimeout(() => $(this).removeClass('shake-error'), 500);
                }
            }
        });
    });

    function closeModal() { $('#modal').hide(); }
</script>

</body>
</html>
