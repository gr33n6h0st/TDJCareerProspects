<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDJ Career Matcher</title>
    <style>
        :root {
            --bg: #f8fafc;
            --dark: #0f172a;
            --accent: #6366f1;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--dark);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--dark);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        .score-display { background: var(--accent); padding: 5px 15px; border-radius: 20px; font-weight: bold; }

        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 40px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            box-sizing: border-box;
        }

        .column { display: flex; flex-direction: column; gap: 15px; }
        .section-label { font-size: 0.8rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }

        .skill-box {
            background: white;
            padding: 18px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            cursor: grab;
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .skill-box:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .skill-box:active { cursor: grabbing; }

        .career-card {
            background: white;
            border: 2px dashed #cbd5e1;
            padding: 20px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 80px;
            transition: all 0.3s;
            position: relative;
        }

        .career-card.hover { border-color: var(--accent); background: #f5f3ff; }
        .career-card.correct { border: 2px solid var(--success); background: #f0fdf4; color: var(--success); border-style: solid; }

        .career-name { font-weight: 800; font-size: 1.1rem; margin-bottom: 4px; }
        .career-field { font-size: 0.8rem; font-weight: 600; color: #64748b; }

        /* Success Pop-up */
        #popup {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            z-index: 100;
            text-align: center;
            max-width: 400px;
            border: 4px solid var(--success);
        }

        #popup h2 { margin-top: 0; color: var(--success); }
        #popup button { background: var(--dark); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 90; }
    </style>
</head>
<body>

<header>
    <h1>TDJ Career Dashboard</h1>
    <div class="score-display">MATCHED: <span id="score">0</span> / 8</div>
</header>

<div class="main-grid">
    <div class="column" id="skills-list">
        <div class="section-label">Your Classroom Skills</div>
        </div>

    <div class="column" id="careers-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="section-label" style="grid-column: span 2;">Industry Target Careers</div>
        </div>
</div>

<div class="overlay" id="overlay"></div>
<div id="popup">
    <h2 id="p-title">Match!</h2>
    <p id="p-desc"></p>
    <button onclick="closePopup()">Continue</button>
</div>

<script>
    const data = [
        { id: '1', s: 'Isometric & Orthographic Sketching', c: 'Mechanical Technologist', f: 'Manufacturing', d: 'Standardized drawings are the blueprint for building complex machines across the world.' },
        { id: '2', s: 'Machine Tool Safety (Bandsaws/Saws)', c: 'Industrial Fabricator', f: 'Trades / Prototype', d: 'Safely shaping wood and metal into specific forms is a high-demand industry skill.' },
        { id: '3', s: 'Framing & Structural Assembly', c: 'Project Superintendent', f: 'Construction', d: 'Understanding how joints and skeletons hold loads is essential for managing building sites.' },
        { id: '4', s: '3D Printing & Digital Fab', c: 'Rapid Prototyper', f: 'Tech & Aerospace', d: 'You bridge the gap between a 3D computer model and a physical object you can hold.' },
        { id: '5', s: 'Precision Measurement', c: 'Quality Control Lead', f: 'Civil Engineering', d: 'Being accurate to the millimeter prevents massive financial losses during a build.' },
        { id: '6', s: 'The Design Process (SPICE)', c: 'Product Designer', f: 'Innovation', d: 'The SPICE loop is the same workflow used by the world’s most successful design agencies.' },
        { id: '7', s: 'Video & Media Documentation', c: 'Technical Media Lead', f: 'Communications', d: 'If you can’t show how a product works, the user will never understand its value.' },
        { id: '8', s: 'Cardboard & Ergonomic Mockups', c: 'Usability Consultant', f: 'UX / Product Design', d: 'Mocking up ideas in cardboard tests if a design is comfortable for humans before building the real thing.' }
    ];

    let score = 0;

    function setup() {
        const sContainer = document.getElementById('skills-list');
        const cContainer = document.getElementById('careers-list');

        [...data].sort(() => Math.random() - 0.5).forEach(item => {
            const div = document.createElement('div');
            div.className = 'skill-box';
            div.draggable = true;
            div.innerText = item.s;
            div.id = `skill-${item.id}`;
            div.addEventListener('dragstart', (e) => e.dataTransfer.setData('text', e.target.id));
            sContainer.appendChild(div);
        });

        [...data].sort(() => Math.random() - 0.5).forEach(item => {
            const div = document.createElement('div');
            div.className = 'career-card';
            div.dataset.match = `skill-${item.id}`;
            div.innerHTML = `<div class="career-name">${item.c}</div><div class="career-field">Field: ${item.f}</div>`;
            
            div.addEventListener('dragover', (e) => e.preventDefault());
            div.addEventListener('dragenter', () => div.classList.add('hover'));
            div.addEventListener('dragleave', () => div.classList.remove('hover'));
            div.addEventListener('drop', handleDrop);
            cContainer.appendChild(div);
        });
    }

    function handleDrop(e) {
        e.preventDefault();
        const card = e.currentTarget;
        card.classList.remove('hover');
        const skillId = e.dataTransfer.getData('text');

        if (card.dataset.match === skillId) {
            const match = data.find(d => `skill-${d.id}` === skillId);
            card.classList.add('correct');
            card.innerHTML = `<div class="career-name">✓ ${match.c}</div><div class="career-field">${match.s}</div>`;
            document.getElementById(skillId).style.display = 'none';
            
            document.getElementById('p-desc').innerText = match.d;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('popup').style.display = 'block';
            
            score++;
            document.getElementById('score').innerText = score;
        } else {
            alert("Incorrect pairing. Think about how that specific shop skill applies to the field.");
        }
    }

    function closePopup() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('popup').style.display = 'none';
    }

    setup();
</script>
</body>
</html>
