<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDJ: The Career Blueprint</title>
    <style>
        :root {
            --blue-print: #004a99;
            --paper: #f0f4f8;
            --accent: #ffcc00;
            --success: #27ae60;
            --text: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--blue-print);
            background-image: radial-gradient(#ffffff22 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid #fff;
        }

        h1 { margin: 0; text-transform: uppercase; letter-spacing: 3px; font-size: 1.5rem; }
        .counter { font-weight: bold; color: var(--accent); margin-top: 5px; }

        .blueprint-table {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
            max-width: 1100px;
            margin: 0 auto;
            flex: 1;
            width: 100%;
            box-sizing: border-box;
        }

        .col { display: flex; flex-direction: column; gap: 10px; }
        .col-title { font-size: 0.8rem; opacity: 0.7; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid #fff; }

        .skill-node {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #fff;
            padding: 15px;
            border-radius: 4px;
            cursor: grab;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .skill-node:hover { background: var(--accent); color: #000; }

        .career-slot {
            border: 2px dashed rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: auto;
        }

        .career-slot.drag-over { border-color: var(--accent); background: rgba(255, 204, 0, 0.1); }
        .career-slot.filled { border: 2px solid var(--success); background: rgba(39, 174, 96, 0.2); color: var(--success); font-weight: bold; }

        .sub-career { font-size: 0.7rem; opacity: 0.6; margin-top: 4px; pointer-events: none; }
        .c-name { pointer-events: none; }

        /* Success Message */
        #success-pop {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; color: #333;
            padding: 30px; border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            z-index: 1000; text-align: center; width: 350px;
        }

        #success-pop button {
            background: var(--blue-print); color: white; border: none;
            padding: 10px 20px; border-radius: 5px; margin-top: 20px; cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>The Designer's Career Blueprint</h1>
    <div class="counter">MATCHED: <span id="count">0</span> / 8</div>
</header>

<div class="blueprint-table">
    <div class="col" id="skills-wrap">
        <div class="col-title">Workshop & Studio Skills</div>
    </div>
    <div class="col" id="careers-wrap">
        <div class="col-title">Industry Career Paths</div>
    </div>
</div>

<div id="success-pop">
    <h2 style="color:var(--success)">Match Validated!</h2>
    <p id="match-info"></p>
    <button onclick="closePop()">Next Skill</button>
</div>

<script>
    const coreData = [
        { id: 'a', s: 'Technical Sketching (ISO/Ortho)', c: 'Mechanical Technologist', p: 'Engineering', d: 'Visualizing 3D parts as 2D blueprints is the standard for global manufacturing.' },
        { id: 'b', s: 'Framing & Structural Assembly', c: 'Project Superintendent', p: 'Construction', d: 'Understanding how raw materials join to form a skeleton is vital for managing massive builds.' },
        { id: 'c', s: 'The Design Process (SPICE)', c: 'Systems Designer', p: 'Innovation / Tech', d: 'SPICE ensures you don\'t just build—you solve. Every great invention follows this logical loop.' },
        { id: 'd', s: 'Machine Safety (Saws & Tools)', c: 'Model Maker / Fabricator', p: 'Industrial Arts', d: 'The ability to safely use heavy machinery to shape prototypes is a high-demand industry skill.' },
        { id: 'e', s: 'Precision Measurement', c: 'Site Surveyor', p: 'Civil Engineering', d: 'If a design is off by a fraction, the build fails. Accuracy is the difference between a job and a career.' },
        { id: 'f', s: '3D Printing & Digital Fab', c: 'Additive Mfg Specialist', p: 'High-Tech Mfg', d: 'Bridging the gap between a computer screen and a physical object is the future of production.' },
        { id: 'g', s: 'Research & Video Documentation', c: 'Technical Media Lead', p: 'Communications', d: 'If you can\'t document the "how" and "why," the client won\'t understand the value of your work.' },
        { id: 'h', s: 'Ergonomic & Cardboard Mockups', c: 'Usability Consultant', p: 'User Experience', d: 'Testing how things feel in a human hand (ergonomics) saves time before the real building starts.' }
    ];

    let matches = 0;

    function start() {
        const sw = document.getElementById('skills-wrap');
        const cw = document.getElementById('careers-wrap');

        // Shuffle and Build
        [...coreData].sort(() => Math.random() - 0.5).forEach(item => {
            const node = document.createElement('div');
            node.className = 'skill-node';
            node.draggable = true;
            node.innerText = item.s;
            node.id = item.id;
            node.addEventListener('dragstart', e => e.dataTransfer.setData('text', e.target.id));
            sw.appendChild(node);
        });

        [...coreData].sort(() => Math.random() - 0.5).forEach(item => {
            const slot = document.createElement('div');
            slot.className = 'career-slot';
            slot.dataset.match = item.id;
            slot.innerHTML = `<div class="c-name">${item.c}</div><div class="sub-career">Field: ${item.p}</div>`;
            
            slot.addEventListener('dragover', e => e.preventDefault());
            slot.addEventListener('dragenter', e => slot.classList.add('drag-over'));
            slot.addEventListener('dragleave', e => slot.classList.remove('drag-over'));
            slot.addEventListener('drop', handleDrop);
            cw.appendChild(slot);
        });
    }

    function handleDrop(e) {
        e.preventDefault();
        const slot = e.currentTarget;
        slot.classList.remove('drag-over');
        const skillId = e.dataTransfer.getData('text');
        
        if (slot.dataset.match === skillId) {
            const data = coreData.find(d => d.id === skillId);
            slot.classList.add('filled');
            slot.innerText = "MATCHED: " + data.s;
            document.getElementById(skillId).style.display = 'none';
            document.getElementById('match-info').innerText = data.d;
            document.getElementById('success-pop').style.display = 'block';
            matches++;
            document.getElementById('count').innerText = matches;
        } else {
            // Simplified error - just a visual shake or alert
            slot.style.borderColor = 'red';
            setTimeout(() => slot.style.borderColor = 'rgba(255,255,255,0.5)', 500);
        }
    }

    function closePop() { document.getElementById('success-pop').style.display = 'none'; }
    start();
</script>
</body>
</html>
