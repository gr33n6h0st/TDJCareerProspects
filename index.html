<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDJ Skills to Career Mapper</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --accent: #00d4ff;
            --text: #e0e0e0;
            --success: #00ff88;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevents scrolling */
        }

        header {
            text-align: center;
            padding: 15px;
            background: var(--panel);
            border-bottom: 2px solid #333;
        }

        h1 { margin: 0; font-size: 1.4rem; color: var(--accent); }
        p { margin: 5px 0 0; font-size: 0.9rem; opacity: 0.7; }

        .game-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            flex: 1;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 5px;
        }

        .draggable {
            background: #333;
            padding: 12px;
            border-radius: 6px;
            cursor: grab;
            font-weight: 600;
            border: 1px solid #444;
            font-size: 0.9rem;
            text-align: center;
            transition: 0.2s;
        }

        .draggable:hover { border-color: var(--accent); background: #3d3d3d; }

        .drop-zone {
            background: var(--panel);
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 10px;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: 0.3s;
        }

        .career-name { font-weight: bold; font-size: 0.95rem; }
        .parent-field { font-size: 0.75rem; opacity: 0.6; margin-top: 2px; }

        .drop-zone.hover { border-color: var(--accent); background: #252525; }
        .drop-zone.matched { border: 2px solid var(--success); background: rgba(0, 255, 136, 0.1); color: var(--success); }

        /* Pop up overlay */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: #252525;
            padding: 30px;
            border-radius: 12px;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--accent);
        }

        button {
            background: var(--accent);
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<header>
    <h1>Technological Design: Skill Mapper</h1>
    <p>Match the TDJ classroom skill to the professional career path.</p>
</header>

<div class="game-container">
    <div class="column" id="skills-col">
        <div class="label">TDJ Classroom Skills</div>
        </div>

    <div class="column" id="careers-col">
        <div class="label">Professional Careers</div>
        </div>
</div>

<div id="overlay">
    <div class="modal">
        <h2 style="color:var(--success)">Match Confirmed!</h2>
        <p id="descText"></p>
        <button onclick="closeModal()">Next Match</button>
    </div>
</div>

<script>
    const mapping = [
        { id: '1', skill: 'Technical Sketching', career: 'Concept Artist', field: 'Industrial Design', info: 'Hand sketching is the first step in communicating ideas before they ever reach a computer.' },
        { id: '2', skill: '3D CAD Modeling', career: 'Mechanical Technologist', field: 'Engineering', info: 'Turning 2D ideas into 3D digital parts is core to modern manufacturing and robotics.' },
        { id: '3', skill: 'Architectural Drafting', career: 'Urban Planner', field: 'Architecture', info: 'Understanding floor plans and site layouts helps in designing how cities and buildings function.' },
        { id: '4', skill: 'The Design Process', career: 'Project Coordinator', field: 'Business & Tech', info: 'The SPICE (Situation, Problem, Ideas, Choice, Evaluation) process is used in almost every management job.' },
        { id: '5', skill: 'Physical Model Building', career: 'Industrial Designer', field: 'Product Design', info: 'Building scale models helps test ergonomics—how a product actually feels in a human hand.' },
        { id: '6', skill: 'Technical Reporting', career: 'Technical Writer', field: 'Communications', info: 'Explaining how a design works in writing is essential for safety manuals and patent filings.' }
    ];

    function init() {
        const skillsCol = document.getElementById('skills-col');
        const careersCol = document.getElementById('careers-col');

        // Shuffle skills
        [...mapping].sort(() => Math.random() - 0.5).forEach(item => {
            const div = document.createElement('div');
            div.className = 'draggable';
            div.draggable = true;
            div.innerText = item.skill;
            div.id = `skill-${item.id}`;
            div.addEventListener('dragstart', (e) => e.dataTransfer.setData('text', e.target.id));
            skillsCol.appendChild(div);
        });

        // Shuffle careers
        [...mapping].sort(() => Math.random() - 0.5).forEach(item => {
            const div = document.createElement('div');
            div.className = 'drop-zone';
            div.dataset.match = `skill-${item.id}`;
            div.innerHTML = `<div class="career-name">${item.career}</div><div class="parent-field">Field: ${item.field}</div>`;
            
            div.addEventListener('dragover', (e) => e.preventDefault());
            div.addEventListener('dragenter', (e) => div.classList.add('hover'));
            div.addEventListener('dragleave', (e) => div.classList.remove('hover'));
            div.addEventListener('drop', handleDrop);
            
            careersCol.appendChild(div);
        });
    }

    function handleDrop(e) {
        e.preventDefault();
        const zone = e.currentTarget;
        zone.classList.remove('hover');
        const draggedId = e.dataTransfer.getData('text');

        if (zone.dataset.match === draggedId) {
            zone.classList.add('matched');
            const data = mapping.find(m => `skill-${m.id}` === draggedId);
            document.getElementById(draggedId).style.visibility = 'hidden';
            document.getElementById('descText').innerText = data.info;
            document.getElementById('overlay').style.display = 'flex';
        } else {
            alert("Pairing incorrect. Look at the 'Field' for a hint!");
        }
    }

    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
    }

    init();
</script>
</body>
</html>
