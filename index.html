<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design & Tech: Career Quest</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #f43f5e;
            --glass: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #000000);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            text-align: center;
            padding: 25px 10px;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .score-pill {
            display: inline-block;
            background: var(--glass);
            padding: 5px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            margin-top: 10px;
            font-weight: 600;
            color: #fbbf24;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 0 40px 40px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            flex: 1;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .col-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94a3b8;
            margin-bottom: 10px;
            text-align: center;
        }

        .skill-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-radius: 12px;
            cursor: grab;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .skill-card:hover {
            transform: scale(1.02);
            border-color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.15);
        }

        .target-card {
            background: rgba(0, 0, 0, 0.3);
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            min-height: 65px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: 0.3s;
        }

        .target-card.hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .target-card.correct {
            border: 2px solid #10b981;
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            animation: pulse 0.5s ease-out;
        }

        .job-name { font-weight: 800; font-size: 1rem; }
        .job-hint { font-size: 0.75rem; opacity: 0.6; margin-top: 4px; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Modal Overlay */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: #1e293b;
            padding: 40px;
            border-radius: 24px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            border: 1px solid var(--primary);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #modal h2 { color: #10b981; margin-top: 0; }
        #modal p { line-height: 1.6; color: #cbd5e1; font-size: 1.1rem; }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { transform: translateY(-2px); background: #4f46e5; }
    </style>
</head>
<body>

<header>
    <h1>Career Quest: Tech Design</h1>
    <div class="score-pill">MATCHED: <span id="score">0</span> / 8</div>
</header>

<div class="container">
    <div class="column" id="skills-list">
        <div class="col-label">The Workshop (Skills)</div>
    </div>
    <div class="column" id="targets-list">
        <div class="col-label">The Industry (Careers)</div>
    </div>
</div>

<div id="modal">
    <div class="modal-box">
        <h2 id="m-title">Skill Unlocked!</h2>
        <p id="m-desc"></p>
        <button onclick="closeModal()">Next Match</button>
    </div>
</div>

<script>
    const quizData = [
        { id: '1', s: '🪚 Bandsaw & Machine Safety', c: 'Industrial Fabricator', h: 'Heavy Machinery / Manufacturing', d: 'Mastering the shop floor! Safely shaping materials is the heart of custom manufacturing.' },
        { id: '2', s: '🏠 Structural Framing & Joinery', c: 'Construction Lead', h: 'Trades / Civil Engineering', d: 'You built the skeleton! Understanding joints and framing ensures structures can handle weight and weather.' },
        { id: '3', s: '📐 ISO & Orthographic Drawings', c: 'Mechanical Technologist', h: 'Engineering / Design', d: 'Universal language! Your 2D plans allow engineers to build your ideas exactly as you imagined.' },
        { id: '4', s: '📦 Cardboard Prototyping', c: 'Product Concept Designer', h: 'Design / UX', d: 'Fail fast, learn fast! Low-cost cardboard models are used by giants like Nike and Apple to test ideas.' },
        { id: '5', s: '💻 3D CAD Modeling', c: 'Digital Prototyper', h: 'Tech / Manufacturing', d: 'The digital twin! 3D models are the blueprint for everything from rocket parts to medical implants.' },
        { id: '6', s: '📋 SPICE (The Design Process)', c: 'Project Manager', h: 'Management / Business', d: 'Process power! Using a logical workflow (SPICE) is how the worlds biggest projects stay on track.' },
        { id: '7', s: '📏 Precision Measurement', c: 'Quality Control Inspector', h: 'Civil Tech / Aerospace', d: 'Measure twice, cut once. In the real world, being off by a millimeter can cost thousands!' },
        { id: '8', s: '🎥 Video Research & Editing', c: 'Technical Media Producer', h: 'Communications', d: 'Tell the story! Documenting your build process is vital for patents, safety, and marketing.' }
    ];

    let score = 0;

    function init() {
        const sCol = document.getElementById('skills-list');
        const tCol = document.getElementById('targets-list');

        // Randomize skills
        [...quizData].sort(() => Math.random() - 0.5).forEach(item => {
            const div = document.createElement('div');
            div.className = 'skill-card';
            div.draggable = true;
            div.innerText = item.s;
            div.id = `s-${item.id}`;
            div.addEventListener('dragstart', e => e.dataTransfer.setData('text', e.target.id));
            sCol.appendChild(div);
        });

        // Randomize targets
        [...quizData].sort(() => Math.random() - 0.5).forEach(item => {
            const div = document.createElement('div');
            div.className = 'target-card';
            div.dataset.match = `s-${item.id}`;
            div.innerHTML = `<div class="job-name">${item.c}</div><div class="job-hint">Field: ${item.h}</div>`;
            div.addEventListener('dragover', e => e.preventDefault());
            div.addEventListener('dragenter', () => div.classList.add('hover'));
            div.addEventListener('dragleave', () => div.classList.remove('hover'));
            div.addEventListener('drop', handleDrop);
            tCol.appendChild(div);
        });
    }

    function handleDrop(e) {
        e.preventDefault();
        const slot = e.currentTarget;
        slot.classList.remove('hover');
        const draggedId = e.dataTransfer.getData('text');

        if (slot.dataset.match === draggedId) {
            slot.classList.add('correct');
            const matchData = quizData.find(d => `s-${d.id}` === draggedId);
            document.getElementById(draggedId).style.display = 'none';
            document.getElementById('m-desc').innerText = matchData.d;
            document.getElementById('modal').style.display = 'flex';
            score++;
            document.getElementById('score').innerText = score;
            
            if (score === quizData.length) {
                document.getElementById('m-title').innerText = "🏆 Mastery Achieved!";
                document.getElementById('m-desc').innerText = "You've successfully mapped your classroom workshop skills to professional industry careers!";
            }
        } else {
            // No alert - just shake or let them try again for a "smoother" feel
            const draggedElem = document.getElementById(draggedId);
            draggedElem.style.border = "1px solid var(--accent)";
            setTimeout(() => draggedElem.style.border = "1px solid rgba(255,255,255,0.1)", 500);
        }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    init();
</script>
</body>
</html>
