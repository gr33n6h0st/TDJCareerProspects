<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDJ Career Explorer</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --success: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        /* HUB STYLES */
        #hub-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            transition: transform 0.5s ease-in-out;
        }

        .hub-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1000px;
            width: 100%;
        }

        .category-card {
            background: var(--card);
            padding: 40px 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .category-card:hover {
            border-color: var(--accent);
            transform: translateY(-10px);
            background: #27354d;
        }

        /* CHALLENGE PAGE STYLES */
        #challenge-page {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            padding: 40px;
            box-sizing: border-box;
            z-index: 100;
        }

        .back-btn {
            background: none; border: 1px solid var(--accent);
            color: var(--accent); padding: 10px 20px; border-radius: 8px;
            cursor: pointer; margin-bottom: 20px;
        }

        .challenge-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
            max-width: 1100px; margin: 0 auto;
        }

        .skill-box {
            background: var(--card); padding: 15px; border-radius: 8px;
            cursor: grab; border-left: 5px solid var(--accent); margin-bottom: 10px;
        }

        .target-box {
            background: rgba(255,255,255,0.05); border: 2px dashed #475569;
            padding: 20px; border-radius: 12px; min-height: 80px;
            display: flex; flex-direction: column; justify-content: center;
        }

        .target-box.correct { border: 2px solid var(--success); background: rgba(16, 185, 129, 0.1); }

        /* MODAL */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--card); padding: 40px; border-radius: 20px;
            max-width: 500px; text-align: center; border: 2px solid var(--success);
        }
    </style>
</head>
<body>

<div id="hub-page">
    <h1>Technological Design Career Hub</h1>
    <p>Select a pathway to explore the required shop and design skills.</p>
    <div class="hub-grid">
        <div class="category-card" onclick="openChallenge('mechanical')">⚙️ Mechanical Design</div>
        <div class="category-card" onclick="openChallenge('architectural')">🏗️ Architectural Design</div>
        <div class="category-card" onclick="openChallenge('robotics')">🤖 Robotics & Control</div>
        <div class="category-card" onclick="openChallenge('industrial')">🚲 Industrial Design</div>
        <div class="category-card" onclick="openChallenge('interior')">🛋️ Interior Design</div>
        <div class="category-card" onclick="openChallenge('apparel')">👕 Apparel & Textile</div>
    </div>
</div>

<div id="challenge-page">
    <button class="back-btn" onclick="goHome()">← Back to Hub</button>
    <h2 id="challenge-title">Field Challenge</h2>
    <div class="challenge-container">
        <div id="skills-col"></div>
        <div id="targets-col"></div>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <h2 style="color:var(--success)">Deep Dive Match</h2>
        <p id="modal-text"></p>
        <button class="back-btn" onclick="closeModal()" style="margin-top:20px;">Keep Exploring</button>
    </div>
</div>

<script>
    const database = {
        mechanical: [
            { s: "ISO/Ortho Sketching", c: "Aerospace Technician", d: "In Aerospace, parts are built by different global teams. Your Orthographic sketches ensure a wing built in France fits a fuselage built in Canada perfectly." },
            { s: "Bandsaw Safety & Metalwork", c: "Engine Fabricator", d: "Custom engine components require precise physical shaping. Knowing your shop machines allows you to prototype metal parts before high-speed testing." }
        ],
        architectural: [
            { s: "Structural Framing Logic", c: "Civil Engineer", d: "Understanding how studs and joists support a roof in class is the foundation of building skyscrapers that can withstand Ontario winters and high winds." },
            { s: "Scale Floor Plans", c: "Urban Planner", d: "Designing at 1/4 inch scale teaches you spatial awareness, which is vital when planning how thousands of people navigate a city block." }
        ],
        robotics: [
            { s: "Circuitry & Logic Gates", c: "Control Systems Designer", d: "The same logic you use to wire a sensor in class is used to program factory assembly lines that build electric cars." },
            { s: "3D Digital Prototyping", c: "Robotics Developer", d: "Digital models allow you to test joint movement (kinematics) in a simulation before you spend money on physical aluminum parts." }
        ],
        industrial: [
            { s: "Cardboard Ergonomic Models", c: "Consumer Product Designer", d: "Building cardboard mockups of tool handles or phones helps engineers find the most comfortable shape for the human hand." },
            { s: "Surface Finishing & Assembly", c: "Furniture Designer", p: "The fit and finish of a joint determine if a product feels 'premium' or 'cheap' to a customer." }
        ],
        interior: [
            { s: "Material Layout & Texturing", c: "Interior Architect", d: "Knowing how to measure and layout material waste in the shop translates to calculating expensive flooring and finishes for a client." },
            { s: "Perspective Sketching", c: "3D Renderer", d: "Drawing rooms in 2-point perspective helps clients 'see' the finished space before a single hammer is swung." }
        ],
        apparel: [
            { s: "Pattern Making & Cutting", c: "Technical Designer", d: "The geometry used to layout a wood project is identical to creating patterns that allow fabric to curve around a moving body." },
            { s: "Tensile Strength Research", c: "Apparel Development Manager", d: "Researching material durability in class is how professionals choose fabrics for high-performance athletic gear or safety vests." }
        ]
    };

    function openChallenge(field) {
        document.getElementById('hub-page').style.display = 'none';
        document.getElementById('challenge-page').style.display = 'block';
        document.getElementById('challenge-title').innerText = field.toUpperCase() + " Field Challenge";
        
        const sCol = document.getElementById('skills-col');
        const tCol = document.getElementById('targets-col');
        sCol.innerHTML = '<div style="opacity:0.6; font-size:0.8rem; margin-bottom:10px;">CLASSROOM SKILLS</div>';
        tCol.innerHTML = '<div style="opacity:0.6; font-size:0.8rem; margin-bottom:10px;">INDUSTRY CAREERS</div>';

        const list = database[field];
        
        list.forEach((item, idx) => {
            const sDiv = document.createElement('div');
            sDiv.className = 'skill-box';
            sDiv.draggable = true;
            sDiv.innerText = item.s;
            sDiv.id = `skill-${idx}`;
            sDiv.addEventListener('dragstart', e => e.dataTransfer.setData('text', e.target.id));
            sCol.appendChild(sDiv);

            const tDiv = document.createElement('div');
            tDiv.className = 'target-box';
            tDiv.dataset.match = `skill-${idx}`;
            tDiv.dataset.desc = item.d;
            tDiv.innerHTML = `<strong>${item.c}</strong>`;
            tDiv.addEventListener('dragover', e => e.preventDefault());
            tDiv.addEventListener('drop', handleDrop);
            tCol.appendChild(tDiv);
        });
    }

    function handleDrop(e) {
        e.preventDefault();
        const draggedId = e.dataTransfer.getData('text');
        const target = e.currentTarget;

        if (target.dataset.match === draggedId) {
            target.classList.add('correct');
            document.getElementById(draggedId).style.display = 'none';
            document.getElementById('modal-text').innerText = target.dataset.desc;
            document.getElementById('modal').style.display = 'flex';
        } else {
            alert("This career requires a different specialized skill from the shop!");
        }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function goHome() { 
        document.getElementById('hub-page').style.display = 'flex';
        document.getElementById('challenge-page').style.display = 'none';
    }
</script>
</body>
</html>
